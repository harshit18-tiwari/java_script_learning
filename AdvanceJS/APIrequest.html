<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">
    0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete.
</body>
<script>
    //old method(xml http request)
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest(); //xhr request, it is an object 
    xhr.open('GET', requestUrl)//open hi request ko bhejta h, takes tow parameters --> get and api,,,--> yha p hmmne request send kri, jisko hmme track kiya        
    xhr.onreadystatechange = function(){// to completely tracking the states, that is ansynchronous,for continosouly tracking
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            //this --> is context m baat kr rhe h
            const data = JSON.parse(this.responseText)//to convert json as o/p comes in string from url
            //this --> isse object k m baat kr rha hoo(current context)
            //ab hmmare pass object hai  hmme is m s data nikalna hoo toh is m s data nikalne k liye data.followers
            console.log(typeof data);
            console.log(data.followers);
        }
    }
    xhr.send();//open is called
</script>
</html>
